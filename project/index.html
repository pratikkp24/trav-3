<script>
  (function() {
    try {
      var theme = localStorage.getItem('trav.theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      if (theme === 'dark') {
        // Immediate background set to match native shell Ink color
        document.write('<style>body{background:#0F1E2E !important;}</style>');
      }
    } catch (e) {}
  })();
</script>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:'Poppins',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  body{background:#fff;color:#0F1E2E;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
  button, .btn, .nav-item, .chip{ -webkit-user-select:none; user-select:none; }
  .mobile-hide{ display:flex }
  .mobile-only{ display:none }
  @media (max-width:767px) {

  button{font-family:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#D4D4D4;border-radius:5px;border:2px solid #fff}
  /* Hide scrollbars on horizontal carousels */
  .scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
  .scroll-x::-webkit-scrollbar{display:none}
  .scroll-x{scrollbar-width:none}
  .snap{scroll-snap-align:start}
  /* Tap targets */
  @media (max-width:767px){
    body{font-size:14px}
    ::-webkit-scrollbar{width:0;height:0}
  }
  /* === Dark mode (filter-invert preserves hue, inverts luminance) ===
     Strategy: put an `invert(1) hue-rotate(180deg)` on the `.theme-flip` wrapper
     to globally flip luminance. Children that must keep their ORIGINAL colors
     (images, videos, canvases, brand-colored buttons) re-apply the SAME
     `invert(1) hue-rotate(180deg)` filter. Because two inverts compose to
     identity AND two 180deg hue-rotates compose to 360deg (=identity), the
     net result on those children is identity — they render with their
     original pixels. 180deg is the ONE angle at which CSS hue-rotate is
     near-lossless (it's a simple sign flip of the chroma axes, representable
     exactly by the YIQ-style matrix used by the spec). Any other angle (e.g.
     200deg) loses saturation when chained, which was the cause of the washed
     -out water/trees we saw before. */
  html[data-theme="dark"]{background:#0F1E2E;color-scheme:dark}
  html[data-theme="dark"] body{background:#0F1E2E;color:#fff}
  html[data-theme="dark"] #root{background:#0F1E2E;min-height:100vh}
  /* Parent flip — lossless at 180deg. */
  html[data-theme="dark"] .theme-flip{filter:invert(1) hue-rotate(180deg);background:#fff}
  /* Images/video/canvas: self-cancel so photos render with their native colors. */
  html[data-theme="dark"] .theme-flip img,
  html[data-theme="dark"] .theme-flip video,
  html[data-theme="dark"] .theme-flip canvas{filter:invert(1) hue-rotate(180deg)}
  /* Buttons and brand-colored chrome: self-cancel so #1DBF73 renders as #1DBF73. */
  html[data-theme="dark"] .theme-flip button,
  html[data-theme="dark"] .theme-flip .keep-colors{filter:invert(1) hue-rotate(180deg)}
  /* The Razorpay modal is rendered in a portal outside .theme-flip, so it already
     displays with its own (light) chrome — nothing to do for it here. */
  /* Scrollbar polish in dark */
  html[data-theme="dark"]::-webkit-scrollbar-thumb{background:#1a2e42;border-color:#0F1E2E}
  html[data-theme="dark"] ::-webkit-scrollbar-thumb{background:#1a2e42;border-color:#0F1E2E}
</style>
